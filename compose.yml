services:
  phi:
    image: docker.io/hypergraphintel/peoplesoft-hypergraph-intelligence:latest
    container_name: phi
    restart: unless-stopped
    ports:
      # Set PHI_PORT in your shell/.env to change the port (both the
      # host-published port and what the container listens on internally
      # move together). If you need the host port to differ from the
      # container's internal port instead, override this whole `ports:`
      # line in a compose override file rather than relying on nested
      # variable interpolation, which isn't reliably supported across both
      # docker compose and podman-compose.
      - '${PHI_PORT:-8088}:${PHI_PORT:-8088}'

    environment:
      PHI_CONFIG_FILE: /config/config.json
      PHI_PORT: ${PHI_PORT:-8088}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}

    volumes:
      - ./config/config.json:/config/config.json:ro
      - phi-data:/app/data
      - phi-logs:/app/logs

      # SSH-based log/SQR/COBOL ingestion (optional, off by default).
      # config.json's ssh_hosts.*.key_path uses "~/.ssh/id_rsa", which
      # expands (via os.path.expanduser) against the container's own
      # $HOME -- /app for the image's built-in "phi" user (uid 10001)
      # -- so the key must be mounted at /app/.ssh/id_rsa, not wherever
      # it lives on the host. See README.md's "SSH-based ingestion
      # setup" section for the full first-time setup (a plain bind
      # mount of your real key will fail under rootless Podman with a
      # permission-denied error, because the container's uid won't
      # match your host user's).
      # - ./secrets/id_rsa:/app/.ssh/id_rsa:ro

    extra_hosts:
      - 'host.docker.internal:host-gateway'

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL

volumes:
  phi-data:
  phi-logs: