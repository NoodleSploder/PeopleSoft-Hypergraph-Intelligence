services:
  phi:
    image: docker.io/hypergraphintel/peoplesoft-hypergraph-intelligence:latest
    container_name: phi
    restart: unless-stopped
    # Run as the invoking host user so bind-mounted files (SSH keys,
    # config.json) keep their normal host ownership/permissions instead
    # of needing to be world-readable for the container's own user.
    user: "${PHI_UID:-1000}:${PHI_GID:-1000}"

    ports:
      # Set PHI_PORT in your shell/.env to change the port (both the
      # host-published port and what the container listens on internally
      # move together). If you need the host port to differ from the
      # container's internal port instead, override this whole `ports:`
      # line in a compose override file rather than relying on nested
      # variable interpolation, which isn't reliably supported across both
      # docker compose and podman-compose.
      - '${PHI_PORT:-8088}:${PHI_PORT:-8088}'

    environment:
      PHI_CONFIG_FILE: /config/config.json
      PHI_PORT: ${PHI_PORT:-8088}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}

    volumes:
      - ./config/config.json:/config/config.json:ro
      - phi-data:/app/data
      - phi-logs:/app/logs

      # SSH ingestion: config.json's ssh_hosts.*.key_path entries use
      # absolute host paths, so the key must be mounted at that same
      # path inside the container (not remapped under /home/phi).
      - ${HOME}/.ssh/id_rsa:${HOME}/.ssh/id_rsa:ro
      - ${HOME}/.ssh/known_hosts:${HOME}/.ssh/known_hosts:ro

    extra_hosts:
      - 'host.docker.internal:host-gateway'

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL

volumes:
  phi-data:
  phi-logs: